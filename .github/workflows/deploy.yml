name: Deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/278573043109/locations/global/workloadIdentityPools/github-actions-pool/providers/github
          service_account: github-actions-sa@neuraconcept-grading.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker asia-south1-docker.pkg.dev
      - run: |
          docker build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=neuraconcept-grading \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=neuraconcept-grading.firebaseapp.com \
            -t asia-south1-docker.pkg.dev/neuraconcept-grading/cloud-run/gradeowl-web:${{ github.sha }} .
          docker push asia-south1-docker.pkg.dev/neuraconcept-grading/cloud-run/gradeowl-web:${{ github.sha }}
      - run: |
          # TODO: Replace API_URL with internal Cloud Run URL for lower latency
          # (currently routes through Cloudflare -> Cloud Run, adding an external hop)
          gcloud run deploy gradeowl-web \
            --image asia-south1-docker.pkg.dev/neuraconcept-grading/cloud-run/gradeowl-web:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "API_URL=https://api.neuraconcept.com"
